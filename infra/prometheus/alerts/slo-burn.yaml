groups:
  - name: loop-slo-burn
    rules:
      - alert: LoopControlPlaneAvailabilityBurn
        expr: loop_slo_error_budget_burn_rate{service="control-plane",objective="availability",window="5m"} > 14.4
        for: 5m
        labels: { severity: page, pagerduty: "true", pagerduty_receiver: pagerduty-slo, service: control-plane, slo: availability }
        annotations: { summary: "control-plane availability error budget is burning fast", runbook_url: "loop_implementation/engineering/RUNBOOKS.md" }
      - alert: LoopControlPlaneLatencyBurn
        expr: loop_slo_latency_burn_rate{service="control-plane",objective="latency",window="1h"} > 6
        for: 15m
        labels: { severity: page, pagerduty: "true", pagerduty_receiver: pagerduty-slo, service: control-plane, slo: latency }
        annotations: { summary: "control-plane p95 latency is burning error budget", runbook_url: "loop_implementation/engineering/PERFORMANCE.md" }
