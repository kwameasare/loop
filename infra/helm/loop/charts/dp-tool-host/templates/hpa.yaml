{{- /*
HorizontalPodAutoscaler for dp-tool-host. Closes P1 from the infra audit
("dp-tool-host has no PDB and no HPA"). Without an HPA, the pool size
is fixed by replicaCount and cannot scale with tool-execution load.

Off by default so a freshly-installed chart still works on a single-node
dev cluster; production overlays should set autoscaling.enabled=true.
*/}}
{{- if and .Values.enabled .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "dp-tool-host.fullname" . }}
  labels:
    {{- include "dp-tool-host.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "dp-tool-host.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas | default 2 }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage | default 80 }}
{{- end }}
