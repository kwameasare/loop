global:
  imageRegistry: ghcr.io/loop
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

enabled: true
image:
  repository: tool-host
  tag: "0.1.0"
replicaCount: 1
service:
  port: 8002
sandboxRuntimeClassName: loop-firecracker
kata:
  required: true
  runtimeClassHandler: kata-fc
preInstallCheck:
  enabled: true
  image: docker.io/bitnami/kubectl:1.30.6
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
  name: ""
  annotations: {}
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
env: {}

# Closes P1 from the prod-readiness audit: dp-tool-host had no PDB
# and no HPA. Both off-by-default for single-replica dev installs;
# production overlays should flip both to true.
podDisruptionBudget:
  enabled: false
  minAvailable: null
  maxUnavailable: 1
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
