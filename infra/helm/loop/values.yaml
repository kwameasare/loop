# Loop self-host chart values.
#
# Every external service URI lives under `.externals` -- swap these
# for managed equivalents (RDS, ElastiCache, MSK, etc.) per
# loop_implementation/architecture/CLOUD_PORTABILITY.md. The default
# values point at in-cluster fakes so `helm install loop ./infra/helm/loop`
# brings up a usable single-node sandbox.

global:
  imageRegistry: ghcr.io/loop
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  deploymentMode: shared
  customerId: ""
  isolation:
    dedicatedStack: false

# Per-service NetworkPolicies. See `templates/network-policies.yaml`.
# Default ON; flip to false in CNI-less / no-NetworkPolicy environments.
# `ingressNamespaceLabels` should match the namespace where your
# Ingress controller (nginx-ingress, gce, etc.) runs so the studio's
# external entrypoints reach cp-api / runtime.
networkPolicies:
  enabled: true
  ingressNamespaceLabels:
    kubernetes.io/metadata.name: ingress-nginx

controlPlane:
  enabled: true
  image:
    repository: control-plane
    tag: "0.1.0"
  replicaCount: 2
  service:
    port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: null
  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: null

runtime:
  enabled: true
  image:
    repository: runtime
    tag: "0.1.0"
  replicaCount: 3
  service:
    port: 8081
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  env: {}
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: null
  pdb:
    enabled: true
    minAvailable: 2
    maxUnavailable: null

gateway:
  enabled: true
  image:
    repository: gateway
    tag: "0.1.0"
  replicaCount: 2
  service:
    port: 8082
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: null
  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: null

kbEngine:
  enabled: true
  image:
    repository: kb-engine
    tag: "0.1.0"
  replicaCount: 2
  service:
    port: 8003
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  env: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: null
  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: null

toolHost:
  enabled: true
  image:
    repository: tool-host
    tag: "0.1.0"
  replicaCount: 1
  service:
    port: 8002
  sandboxRuntimeClassName: loop-firecracker
  kata:
    required: true
    runtimeClassHandler: kata-fc
  preInstallCheck:
    enabled: true
    image: docker.io/bitnami/kubectl:1.30.6
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

externals:
  postgresUrl: "postgresql://loop:loop@loop-postgres:5432/loop"
  redisUrl: "redis://loop-redis:6379/0"
  qdrantUrl: "http://loop-qdrant:6333"
  natsUrl: "nats://loop-nats:4222"
  clickhouseUrl: "http://loop-clickhouse:8123"
  s3Endpoint: "http://loop-minio:9000"
  otelEndpoint: "http://loop-otel-collector:4318"

secrets:
  llmApiKey: ""
  jwtSigningKey: ""

ingress:
  enabled: false
  # Supported: "nginx" (ingress-nginx) or "traefik". Sane defaults are
  # auto-merged into annotations when certManager.enabled=true.
  className: "nginx"
  host: loop.local
  annotations: {}
  tls: []
  # cert-manager integration: when enabled, the ingress is annotated
  # with cert-manager.io/cluster-issuer and a TLS section is rendered
  # using the configured issuer + secretName so a fresh `helm install
  # --set ingress.enabled=true` produces TLS-terminated routes.
  certManager:
    enabled: false
    clusterIssuer: letsencrypt-prod
    tlsSecretName: loop-tls

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Bundled PostgreSQL (Bitnami subchart). Disable to bring your own
# database -- override externals.postgresUrl to point at it.
postgresql:
  enabled: true
  auth:
    username: loop
    password: loop
    database: loop
  primary:
    persistence:
      enabled: true
      size: 10Gi
  fullnameOverride: loop-postgres

# Bundled Redis (Bitnami subchart). Disable to bring your own --
# override externals.redisUrl to point at ElastiCache, Memorystore, etc.
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
  fullnameOverride: loop-redis

# Bundled Qdrant (official chart). Disable to use managed Qdrant Cloud --
# override externals.qdrantUrl + secrets to point at it.
qdrant:
  enabled: true
  replicaCount: 1
  persistence:
    size: 10Gi
  fullnameOverride: loop-qdrant

# Bundled NATS (official chart) with JetStream enabled per AC. Disable to
# point at Synadia Cloud or self-managed NATS via externals.natsUrl.
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          size: 10Gi
  fullnameOverride: loop-nats

# Bundled MinIO (Bitnami subchart) for S3-compatible object storage.
# For production on a hyperscaler, set minio.enabled=false and override
# externals.s3Endpoint + provide credentials via secrets.
minio:
  enabled: true
  mode: standalone
  auth:
    rootUser: loop
    rootPassword: loop-minio-changeme
  persistence:
    enabled: true
    size: 20Gi
  fullnameOverride: loop-minio

# Bundled ClickHouse (Bitnami subchart) for analytics + event store.
# storageClass parameterised per S450 AC; backup config exposed at
# clickhouse.backup.enabled with a configurable schedule + retention.
# Set clickhouse.enabled=false to use ClickHouse Cloud (override
# externals.clickhouseUrl + secrets).
clickhouse:
  enabled: true
  shards: 1
  replicaCount: 1
  auth:
    username: loop
    password: loop-clickhouse-changeme
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  backup:
    enabled: false
    schedule: "0 2 * * *"
    retentionDays: 7
  fullnameOverride: loop-clickhouse
