apiVersion: v2
name: loop
description: |
  Loop self-host chart -- control-plane, runtime, LLM gateway, and
  dp-tool-host sandbox tier, feature-parity with the managed cloud offering.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.27.0-0"
keywords:
  - loop
  - agent-platform
  - llm
home: https://github.com/kwameasare/loop
sources:
  - https://github.com/kwameasare/loop
maintainers:
  - name: Loop Engineering
    email: engineering@loop.local
dependencies:
  # Bitnami PostgreSQL pinned for reproducible deploys; bypass via
  # externals.postgresUrl + postgresql.enabled=false to point at an
  # existing managed Postgres (e.g. RDS, Cloud SQL).
  - name: postgresql
    version: 15.5.38
    repository: oci://ghcr.io/loop-ai/mirrored/bitnami/charts
    condition: postgresql.enabled
  # Bitnami Redis pinned; bypass via externals.redisUrl +
  # redis.enabled=false to point at ElastiCache, Memorystore, etc.
  - name: redis
    version: 20.3.0
    repository: oci://ghcr.io/loop-ai/mirrored/bitnami/charts
    condition: redis.enabled
  # Qdrant official chart pinned; bypass via externals.qdrantUrl +
  # qdrant.enabled=false to point at a managed Qdrant Cloud cluster.
  - name: qdrant
    version: 1.13.6
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.enabled
  # NATS official chart pinned with JetStream on; bypass via
  # externals.natsUrl + nats.enabled=false to point at NATS Synadia
  # Cloud or another managed cluster.
  - name: nats
    version: 1.2.2
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
  # Bitnami MinIO pinned for S3-compatible object storage. Bypass via
  # externals.s3Endpoint + minio.enabled=false to point at AWS S3,
  # GCS via the S3 gateway, or any other managed object store.
  - name: minio
    version: 14.10.5
    repository: oci://ghcr.io/loop-ai/mirrored/bitnami/charts
    condition: minio.enabled
  # Bitnami ClickHouse pinned for analytics/event store. Storage class
  # is parameterised via clickhouse.persistence.storageClass, and a
  # backup CronJob can be enabled via clickhouse.backup.enabled per AC.
  # Bypass with clickhouse.enabled=false to use ClickHouse Cloud.
  - name: clickhouse
    version: 6.2.18
    repository: oci://ghcr.io/loop-ai/mirrored/bitnami/charts
    condition: clickhouse.enabled
  # Local dp-tool-host chart. It is gated by toolHost.enabled and its
  # pre-install hook verifies the Kata/Firecracker RuntimeClass exists.
  - name: dp-tool-host
    alias: toolHost
    version: 0.1.0
    repository: file://charts/dp-tool-host
    condition: toolHost.enabled
