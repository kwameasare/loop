apiVersion: v2
name: loop
description: |
  Loop self-host chart -- control-plane, runtime, and LLM gateway,
  feature-parity with the managed cloud offering.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.27.0-0"
keywords:
  - loop
  - agent-platform
  - llm
home: https://example.invalid/loop
sources:
  - https://example.invalid/loop
maintainers:
  - name: Loop Engineering
    email: eng@example.invalid
dependencies:
  # Bitnami PostgreSQL pinned for reproducible deploys; bypass via
  # externals.postgresUrl + postgresql.enabled=false to point at an
  # existing managed Postgres (e.g. RDS, Cloud SQL).
  - name: postgresql
    version: 15.5.38
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
