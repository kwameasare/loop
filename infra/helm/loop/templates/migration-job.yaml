{{- /*
Pre-install / pre-upgrade Helm hook that runs both alembic migrations
before any service pods boot. Closes P0.6c (audit: "no alembic
migration mechanism in the chart"). Without this hook, a fresh
`helm install` or `helm upgrade` lands service pods that crash-loop
until tables exist, and two upgrading replicas race the migration.

Design notes:
- One Job runs both `loop_control_plane.migrations` and
  `loop_data_plane.migrations` in sequence using the cp-api image
  (which has both packages installed). Sharing one image keeps the
  cluster-pull surface small.
- A pg-advisory-lock guard serialises concurrent helm operations
  (e.g. an Argo CD reconcile racing a `helm upgrade`). The lock id
  is a stable hash of "loop-migrations" so two release names against
  the same DB also serialise.
- helm.sh/hook-weight: -5 puts this before any other pre-install
  hooks (e.g. dp-tool-host's kata-check at weight -10 still runs
  earliest); the migration is intentionally deeper in the chain
  because it requires Postgres to exist (subchart pulls it up).
- helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  cleans up the old Job before a new release so stuck-Failed Jobs
  don't accumulate.
*/}}
{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "loop.fullname" . }}-migrations
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit | default 2 }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished | default 600 }}
  template:
    metadata:
      labels:
        {{- include "loop.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "loop.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "loop.podSecurityContext" . | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "loop.image" (list . .Values.controlPlane) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "loop.containerSecurityContext" . | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "loop.fullname" . }}-config
            - secretRef:
                name: {{ include "loop.fullname" . }}-secrets
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              echo "→ acquiring pg advisory lock"
              # Stable lock id across releases pointing at the same DB.
              python -c "
              import os, hashlib, sys
              from sqlalchemy import create_engine, text
              dsn = os.environ['LOOP_CP_DB_URL']
              engine = create_engine(dsn)
              # Hash 'loop-migrations' to a 64-bit signed int for pg_advisory_lock.
              digest = hashlib.sha1(b'loop-migrations').digest()
              lock_id = int.from_bytes(digest[:8], 'big', signed=True)
              with engine.connect() as conn:
                  conn.execute(text(f'SELECT pg_advisory_lock({lock_id})'))
                  print('→ lock acquired; running migrations')
                  from alembic.config import Config
                  from alembic import command
                  from importlib.resources import files
                  for pkg in ('loop_control_plane.migrations', 'loop_data_plane.migrations'):
                      ini = str(files(pkg).joinpath('alembic.ini'))
                      cfg = Config(ini)
                      cfg.set_main_option('sqlalchemy.url', os.environ['LOOP_CP_DB_URL'] if pkg.startswith('loop_control_plane') else os.environ['LOOP_RUNTIME_DB_URL'])
                      print(f'→ {pkg}: upgrading to head')
                      command.upgrade(cfg, 'head')
                  conn.execute(text(f'SELECT pg_advisory_unlock({lock_id})'))
                  print('→ migrations complete')
              "
          volumeMounts:
            {{- include "loop.writableTmpVolumeMounts" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      volumes:
        {{- include "loop.writableTmpVolumes" . | nindent 8 }}
{{- end }}
