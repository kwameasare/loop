{{- if .Values.kbEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loop.fullname" . }}-kb-engine
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: kb-engine
spec:
  replicas: {{ .Values.kbEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "loop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: kb-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "loop.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: kb-engine
    spec:
      serviceAccountName: {{ include "loop.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kb-engine
          image: {{ include "loop.image" (list . .Values.kbEngine) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.kbEngine.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "loop.fullname" . }}-config
            - secretRef:
                name: {{ include "loop.fullname" . }}-secrets
          {{- with .Values.kbEngine.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.kbEngine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loop.fullname" . }}-kb-engine
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: kb-engine
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.kbEngine.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "loop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: kb-engine
{{- end }}
