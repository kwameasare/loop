{{- if and .Values.kbEngine.enabled .Values.kbEngine.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "loop.fullname" . }}-kb-engine
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: kb-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "loop.fullname" . }}-kb-engine
  minReplicas: {{ .Values.kbEngine.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.kbEngine.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.kbEngine.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.kbEngine.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.kbEngine.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
{{- end }}
