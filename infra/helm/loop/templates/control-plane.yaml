{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loop.fullname" . }}-control-plane
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "loop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "loop.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "loop.serviceAccountName" . }}
      {{- include "loop.gracefulShutdown" . | nindent 6 }}
      securityContext:
        {{- include "loop.podSecurityContext" . | nindent 8 }}
      affinity:
        {{- include "loop.podAntiAffinity" "control-plane" | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "loop.image" (list . .Values.controlPlane) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "loop.containerSecurityContext" . | nindent 12 }}
          lifecycle:
            {{- include "loop.preStopHook" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "loop.fullname" . }}-config
            - secretRef:
                name: {{ include "loop.fullname" . }}-secrets
          env:
            {{- $cpEnv := .Values.controlPlane.env | default dict }}
            - name: "UVICORN_WORKERS"
              value: {{ default (include "loop.recommendedWorkers" (dict "replicaCount" .Values.controlPlane.replicaCount "resources" .Values.controlPlane.resources)) (get $cpEnv "UVICORN_WORKERS") | quote }}
            {{- with $cpEnv }}
            {{- range $name, $value := . }}
            {{- if ne $name "UVICORN_WORKERS" }}
            - name: {{ $name | quote }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          {{- end }}
          startupProbe:
            {{- include "loop.startupProbe" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          volumeMounts:
            {{- include "loop.writableTmpVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "loop.writableTmpVolumes" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loop.fullname" . }}-control-plane
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.controlPlane.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "loop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: control-plane
{{- end }}
