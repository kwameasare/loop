{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loop.fullname" . }}-control-plane
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "loop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "loop.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "loop.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "loop.image" (list . .Values.controlPlane) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "loop.fullname" . }}-config
            - secretRef:
                name: {{ include "loop.fullname" . }}-secrets
          {{- with .Values.controlPlane.env }}
          env:
            {{- range $name, $value := . }}
            - name: {{ $name | quote }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          # uvicorn --workers 4 on a CPU-constrained pod takes ~15-90s to
          # import the 13k-LOC cp-api app into all 4 forked workers. The
          # startup probe gives that import phase up to 2 minutes (24
          # × 5s); once it succeeds once, readiness + liveness take over
          # with the production-tight cadence below.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loop.fullname" . }}-control-plane
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.controlPlane.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "loop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: control-plane
{{- end }}
