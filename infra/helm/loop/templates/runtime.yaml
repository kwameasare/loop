{{- if .Values.runtime.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loop.fullname" . }}-runtime
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  replicas: {{ .Values.runtime.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "loop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "loop.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: runtime
    spec:
      serviceAccountName: {{ include "loop.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runtime
          image: {{ include "loop.image" (list . .Values.runtime) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.runtime.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "loop.fullname" . }}-config
            - secretRef:
                name: {{ include "loop.fullname" . }}-secrets
          {{- with .Values.runtime.env }}
          env:
            {{- range $name, $value := . }}
            - name: {{ $name | quote }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          # uvicorn --workers 4 on a CPU-constrained pod takes 15-60s to
          # import + fork all 4 workers. Startup probe gives that phase
          # up to 2 minutes (24 × 5s); once it succeeds once, readiness
          # + liveness take over with the production-tight cadence below.
          # Mirrors the cp-api template; both apps face the same cold-
          # start vs liveness-deadline race.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.runtime.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loop.fullname" . }}-runtime
  labels:
    {{- include "loop.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.runtime.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "loop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: runtime
{{- end }}
