{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "loop.fullname" . }}
  labels:
    {{- include "loop.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1/cp
            pathType: Prefix
            backend:
              service:
                name: {{ include "loop.fullname" . }}-control-plane
                port:
                  number: {{ .Values.controlPlane.service.port }}
          - path: /v1/runtime
            pathType: Prefix
            backend:
              service:
                name: {{ include "loop.fullname" . }}-runtime
                port:
                  number: {{ .Values.runtime.service.port }}
          - path: /v1/llm
            pathType: Prefix
            backend:
              service:
                name: {{ include "loop.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
{{- end }}
