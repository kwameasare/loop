{{- if .Values.ingress.enabled -}}
{{- $cm := .Values.ingress.certManager | default dict -}}
{{- $cmEnabled := and $cm $cm.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "loop.fullname" . }}
  labels:
    {{- include "loop.labels" . | nindent 4 }}
  annotations:
    {{- if $cmEnabled }}
    cert-manager.io/cluster-issuer: {{ $cm.clusterIssuer | quote }}
    {{- if eq .Values.ingress.className "traefik" }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- else }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if $cmEnabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ $cm.tlsSecretName | quote }}
  {{- else if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1/cp
            pathType: Prefix
            backend:
              service:
                name: {{ include "loop.fullname" . }}-control-plane
                port:
                  number: {{ .Values.controlPlane.service.port }}
          - path: /v1/runtime
            pathType: Prefix
            backend:
              service:
                name: {{ include "loop.fullname" . }}-runtime
                port:
                  number: {{ .Values.runtime.service.port }}
          - path: /v1/llm
            pathType: Prefix
            backend:
              service:
                name: {{ include "loop.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
{{- end }}
