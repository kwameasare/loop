[project]
name = "loop-mcp"
version = "0.1.0"
description = "Loop MCP client — auto-MCP'd Python tools, JSON Schema generator, stdio JSON-RPC transport."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop_mcp"]
