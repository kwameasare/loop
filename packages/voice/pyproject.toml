[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loop-voice"
version = "0.1.0"
description = "Loop voice pipeline: STT, TTS, and realtime transport orchestrated by VoiceSession."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "livekit-api>=1.0",
    "pydantic>=2",
    "sqlalchemy>=2.0",
    "websockets>=15.0",
]

[tool.hatch.build.targets.wheel]
packages = ["loop_voice"]
