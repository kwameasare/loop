[alembic]
script_location = %(here)s
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://loop:loop@localhost:5432/loop
# Per-plane version table so cp-api and dp-runtime can share a database
# (handy in dev) without their migration histories colliding. Production
# deploys SHOULD use separate logical databases (loop_cp, loop_dp) and
# can leave this alone.
version_table = dp_alembic_version

file_template = %%(year)d%%(month).2d%%(day).2d%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
