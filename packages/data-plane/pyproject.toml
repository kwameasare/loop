[project]
name = "loop-data-plane"
version = "0.1.0"
description = "Loop data-plane: conversations, turns, memory. Per-region Postgres migrations."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.13",
    "fastapi>=0.115",
    "loop",
    "loop-gateway",
    "loop-runtime",
    "pydantic>=2",
    "sqlalchemy>=2.0",
    "uvicorn>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop_data_plane"]
