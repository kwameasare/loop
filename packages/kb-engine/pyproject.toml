[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loop-kb-engine"
version = "0.1.0"
description = "Loop knowledge-base engine: chunking, embedding, vector store, hybrid retrieval."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = ["pydantic>=2", "sqlalchemy>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["loop_kb_engine"]
