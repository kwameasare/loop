[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loop-channels-email"
version = "0.1.0"
description = "Loop Email channel adapter: SES inbound + SES SendEmail outbound."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "loop-channels-core",
    "pydantic>=2",
    # SNS message-signature verification (P0.5d) + DKIM verification
    # on inbound (P0.5e) both need RSA-SHA256 + X.509 cert handling.
    "cryptography>=42",
]

[tool.hatch.build.targets.wheel]
packages = ["loop_channels_email"]
