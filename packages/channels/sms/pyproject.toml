[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loop-channels-sms"
version = "0.1.0"
description = "Loop SMS channel adapter: Twilio webhook, outbound send, compliance keywords, and Studio connect flow."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "loop-channels-core",
    "pydantic>=2",
]

[tool.hatch.build.targets.wheel]
packages = ["loop_channels_sms"]
