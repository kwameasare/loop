[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loop-channels-discord"
version = "0.1.0"
description = "Loop Discord channel adapter: Interactions API webhook + followup."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "loop-channels-core",
    "pydantic>=2",
    # ed25519 signature verification on inbound Discord interactions
    # (P0.5a). `cryptography`'s Ed25519PublicKey is the standard
    # high-level binding for libsodium and provides constant-time
    # signature comparison via OpenSSL.
    "cryptography>=42",
]

[tool.hatch.build.targets.wheel]
packages = ["loop_channels_discord"]
