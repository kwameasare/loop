[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loop-channels-web"
version = "0.1.0"
description = "Loop web channel: REST POST + SSE GET adapter."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "loop-channels-core",
    "loop-control-plane",
    "pydantic>=2",
]

[tool.hatch.build.targets.wheel]
packages = ["loop_channels_web"]
