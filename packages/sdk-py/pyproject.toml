[project]
name = "loop"
version = "0.1.0"
description = "Loop public Python SDK — Agent, Tool, Memory, types."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-http>=1.27",
    "pydantic>=2.7",
]

[project.scripts]
loop = "loop.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop"]
