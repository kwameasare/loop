[project]
name = "loop"
version = "0.1.0"
description = "Loop public Python SDK — Agent, Tool, Memory, types."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop"]
