[project]
name = "loop-mcp-salesforce"
version = "0.1.0"
description = "First-party Loop MCP server for Salesforce (accounts, contacts, opportunities, cases)."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "loop-mcp",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop_mcp_salesforce"]
