[project]
name = "loop-memory"
version = "0.1.0"
description = "Loop memory tiers: user/bot persistence in Postgres, session memory in Redis."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "cryptography>=42",
    "pydantic>=2",
    "sqlalchemy>=2.0",
    "redis>=5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop_memory"]
