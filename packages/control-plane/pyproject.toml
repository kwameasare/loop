[project]
name = "loop-control-plane"
version = "0.1.0"
description = "Loop control-plane: tenant data, deploys, billing. Postgres migrations live here."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.13",
    "pydantic>=2",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop_control_plane"]
