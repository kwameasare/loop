[project]
name = "loop-control-plane"
version = "0.1.0"
description = "Loop control-plane: tenant data, deploys, billing. Postgres migrations live here."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.13",
    "fastapi>=0.115",
    "pydantic>=2",
    "pydantic-settings>=2.5",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0",
    "structlog>=25",
    "uvicorn>=0.30",
]

[project.optional-dependencies]
# `vault` extra wires the Vault-transit KMS backend (S918). Install with:
#   uv pip install -e 'packages/control-plane[vault]'
# Only required if LOOP_KMS_BACKEND=vault_transit.
vault = ["hvac>=2.3"]
# `saml` extra wires the production PySAML2Validator (S917) for real
# SAML signature verification. Requires the xmlsec1 system package
# (`brew install libxmlsec1` on macOS, `apt install xmlsec1` on Debian).
# Only required if LOOP_SAML_USE_PYSAML2=1.
saml = ["pysaml2>=7.5"]
# `aws` extra wires the boto3-backed AWS KMS + S3 backends (S905).
# Required when LOOP_KMS_BACKEND=aws_kms or LOOP_OBJSTORE_BACKEND=s3
# in production. Install with:
#   uv pip install -e 'packages/control-plane[aws]'
aws = ["boto3>=1.35"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop_control_plane"]
# Bundle data files (region registry, etc.) into the wheel so cp-api
# starts cleanly in production containers that don't ship the monorepo's
# infra/ tree. Without this, regions.py raises FileNotFoundError at
# import time and the cp-api pod CrashLoops.
[tool.hatch.build.targets.wheel.force-include]
"loop_control_plane/regions.yaml" = "loop_control_plane/regions.yaml"
