[alembic]
# Migration scripts live alongside this ini, in ./versions.
# %(here)s expands to the directory containing alembic.ini.
script_location = %(here)s
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://loop:loop@localhost:5432/loop

# Per-plane version table so cp + dp can share a single Postgres
# database in dev/CI without colliding on the default `alembic_version`
# table. dp's alembic.ini sets `dp_alembic_version`; we set
# `cp_alembic_version` here. In production they'd typically use
# different DBs anyway, but the shared-DB path needs to keep working
# for `make migrate` and the helm pre-install hook.
version_table = cp_alembic_version

# Migration filenames: YYYYMMDDHHMM_<slug>.py — matches HANDBOOK §2.4.
file_template = %%(year)d%%(month).2d%%(day).2d%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
