[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loop-tool-host"
version = "0.1.0"
description = "Loop tool-host: Sandbox + WarmPool for Firecracker/Kata MCP execution."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[tool.hatch.build.targets.wheel]
packages = ["loop_tool_host"]
