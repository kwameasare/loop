[project]
name = "loop-runtime"
version = "0.1.0"
description = "Loop runtime — TurnExecutor, streaming, budgets, idempotency."
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "structlog>=24.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["loop"]
