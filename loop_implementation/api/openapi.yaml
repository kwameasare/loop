openapi: 3.1.0
info:
  title: Loop Platform API
  version: 0.1.0
  description: |
    Public REST API for the Loop agent platform.

    All endpoints require a Bearer token scoped to a workspace.
    Streaming endpoints additionally support Server-Sent Events (SSE) and WebSocket.
  contact:
    name: Loop Engineering
    email: eng@loop.example
  license:
    name: Apache-2.0
servers:
  - url: https://api.loop.example/v1
    description: Production (na-east — abstract region; concrete cloud may be AWS/Azure/GCP/Alibaba/self-host)
  - url: https://api-eu.loop.example/v1
    description: Production (eu-west — same)
  - url: http://localhost:8080/v1
    description: Local dev

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Login exchange and Loop token issuance
  - name: Agents
    description: Agent lifecycle, versioning, and deployment
  - name: Conversations
    description: Message history, HITL takeovers, escalations
  - name: Knowledge
    description: Knowledge base ingestion and search
  - name: MCP
    description: MCP server registration and tool management
  - name: Marketplace
    description: First-party and workspace marketplace catalog
  - name: Evals
    description: Evaluation suites, runs, and test cases
  - name: Usage
    description: Cost and usage analytics
  - name: Traces
    description: Turn traces and observability
  - name: Workspaces
    description: Workspace and member management
  - name: Admin
    description: Audit logs, API keys, secrets, webhooks
  - name: Health
    description: Operational readiness and version checks
  - name: Runtime
    description: Data-plane turn execution and SSE streaming
  - name: Inbox
    description: Human-in-the-loop operator escalation queue
  - name: Memory
    description: Runtime memory inspection and erasure controls
  - name: Voice
    description: Voice channel configuration and preview controls
  - name: Conductor
    description: Multi-agent topology, handoff contracts, and delegation evidence
  - name: Migration
    description: Import parity, replay, repair, and cutover readiness
  - name: CoBuilder
    description: AI co-builder suggestions, consent grammar, and adversarial review

paths:

  /auth/exchange:
    post:
      tags: [Auth]
      summary: Exchange a verified IdP token for Loop bearer credentials
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthExchangeRequest" }
      responses:
        "200":
          description: Loop access + refresh tokens
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthExchangeResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────── Workspaces ────────────────
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces the caller is a member of
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceList"
    post:
      tags: [Workspaces]
      summary: Create workspace
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }

  /workspaces/{workspace_id}:
    get:
      tags: [Workspaces]
      summary: Get workspace
      parameters:
        - { $ref: "#/components/parameters/WorkspaceId" }
        - { $ref: "#/components/parameters/RequestRegion" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Workspaces]
      summary: Update workspace metadata
      description: Workspace `region` is immutable after creation.
      parameters:
        - { $ref: "#/components/parameters/WorkspaceId" }
        - { $ref: "#/components/parameters/RequestRegion" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspacePatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspace_id}/members:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [Workspaces]
      summary: List workspace members
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkspaceMember" }
    post:
      tags: [Workspaces]
      summary: Invite a member to workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [owner, admin, editor, operator, viewer] }
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspaceMember" }

  /workspaces/{workspace_id}/inbox:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [Inbox]
      summary: List pending and caller-claimed inbox items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InboxItemList" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspace_id}/inbox/escalate:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    post:
      tags: [Inbox]
      summary: Escalate a conversation into the operator inbox
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InboxEscalateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InboxItem" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Conversation already has an open inbox item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }

  /workspaces/{workspace_id}/voice/config:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [Voice]
      summary: Get workspace voice channel configuration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoiceConfig" }
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags: [Voice]
      summary: Update voice ASR/TTS provider selections
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VoiceConfigPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoiceConfig" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /workspaces/{workspace_id}/voice/stage:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [Voice]
      summary: Get composed Voice Stage model for a workspace
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoiceStageModel" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /workspaces/{workspace_id}/migration/parity:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [Migration]
      summary: Get migration parity workspace model
      parameters:
        - in: query
          name: source
          schema: { type: string, default: botpress }
          required: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MigrationParityWorkspace" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /workspaces/{workspace_id}/cobuilder:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [CoBuilder]
      summary: Get AI Co-Builder suggestions for workspace state
      parameters:
        - in: query
          name: agent_id
          schema: { type: string, format: uuid }
          required: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CoBuilderWorkspace" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /inbox/{item_id}/claim:
    parameters: [{ $ref: "#/components/parameters/InboxItemId" }]
    post:
      tags: [Inbox]
      summary: Claim an inbox item for the caller or named operator
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InboxClaimRequest" }
      responses:
        "200":
          description: Claimed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InboxItem" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Item is no longer claimable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }

  /inbox/{item_id}/release:
    parameters: [{ $ref: "#/components/parameters/InboxItemId" }]
    post:
      tags: [Inbox]
      summary: Release a claimed inbox item back to pending
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InboxItem" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Item is not currently claimed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }

  /inbox/{item_id}/resolve:
    parameters: [{ $ref: "#/components/parameters/InboxItemId" }]
    post:
      tags: [Inbox]
      summary: Resolve a claimed inbox item
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InboxResolveRequest" }
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InboxItem" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Item is not currently claimed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }

  /workspaces/{workspace_id}/api-keys:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [Admin]
      summary: List API keys
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/APIKey" }
    post:
      tags: [Admin]
      summary: Create an API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name: { type: string }
                scopes: { type: array, items: { type: string }, example: ["agents:deploy", "traces:read"] }
      responses:
        "201":
          description: Created (key shown once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKeyCreated" }

  /workspaces/{workspace_id}/secrets:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    get:
      tags: [Admin]
      summary: List agent secrets (names only, not values)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SecretRef" }

  # ──────────────── Agents ────────────────
  /agents:
    post:
      tags: [Agents]
      summary: Create an agent
      parameters:
        - { $ref: "#/components/parameters/ActiveWorkspaceId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    get:
      tags: [Agents]
      summary: List agents in the active workspace
      parameters:
        - { $ref: "#/components/parameters/ActiveWorkspaceId" }
      responses:
        "200":
          description: OK
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /agents/{agent_id}:
    parameters:
      - { $ref: "#/components/parameters/AgentId" }
      - { $ref: "#/components/parameters/ActiveWorkspaceId" }
    get:
      tags: [Agents]
      summary: Get an agent
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Agents]
      summary: Soft-delete (archive) an agent
      responses:
        "204":
          description: Archived
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agent_id}/tools:
    parameters: [{ $ref: "#/components/parameters/AgentId" }]
    get:
      tags: [Agents]
      summary: List tools declared by the active or latest agent version
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentToolList" }
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agent_id}/memory:
    parameters: [{ $ref: "#/components/parameters/AgentId" }]
    get:
      tags: [Memory]
      summary: List runtime memory visible in Memory Studio
      parameters:
        - in: query
          name: user_id
          schema: { type: string }
          required: false
        - in: query
          name: conversation_id
          schema: { type: string, format: uuid }
          required: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemoryStudioEntryList" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agent_id}/memory/user/{memory_key}:
    parameters:
      - { $ref: "#/components/parameters/AgentId" }
      - { $ref: "#/components/parameters/MemoryKey" }
    delete:
      tags: [Memory]
      summary: Delete one durable user memory entry with audit trail
      parameters:
        - in: query
          name: user_id
          schema: { type: string }
          required: false
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agent_id}/conductor:
    parameters: [{ $ref: "#/components/parameters/AgentId" }]
    get:
      tags: [Conductor]
      summary: Get multi-agent conductor topology for an agent
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConductorData" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agent_id}/versions:
    parameters: [{ $ref: "#/components/parameters/AgentId" }]
    get:
      tags: [Agents]
      summary: List immutable agent versions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentVersionList" }
    post:
      tags: [Agents]
      summary: Create a new immutable agent version
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentVersionCreate" }
      responses:
        "201":
          description: Created
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentVersion" }
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /agents/{agent_id}/versions/{version_id}/promote:
    parameters:
      - { $ref: "#/components/parameters/AgentId" }
      - in: path
        name: version_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Agents]
      summary: Promote a version to active
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }

  /agents/{agent_id}/invoke:
    parameters: [{ $ref: "#/components/parameters/AgentId" }]
    post:
      tags: [Agents]
      summary: Run a turn against the active version of an agent
      description: |
        Invokes an agent. If `?stream=true`, returns Server-Sent Events of `TurnEvent`.
        Otherwise returns a single `AgentResponse` once the turn completes.
      parameters:
        - in: query
          name: stream
          schema: { type: boolean, default: false }
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          required: false
          description: Idempotency key for idempotent invocation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InvokeRequest" }
      responses:
        "200":
          description: OK (non-streaming)
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentResponse" }
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE stream; each `data:` line is a JSON `TurnEvent`.
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /turns:
    post:
      tags: [Runtime]
      summary: Run a data-plane turn
      description: |
        Executes a single turn through the dp-runtime `TurnExecutor`.
        Set `Accept: text/event-stream` or `?stream=true` to receive
        framed `TurnEvent` records followed by a `done` frame.
      security: []
      parameters:
        - in: query
          name: stream
          schema: { type: boolean, default: false }
        - in: header
          name: Accept
          required: false
          schema: { type: string }
        - in: header
          name: Idempotency-Key
          schema: { type: string }
          required: false
          description: Optional request id; request_id in the JSON body wins when both are present.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimeTurnRequest" }
      responses:
        "200":
          description: Turn response or SSE stream
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeTurnResponse" }
            text/event-stream:
              schema:
                type: string
                description: SSE frames carrying `TurnEvent` payloads plus a terminal `done` frame.
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /turns/stream:
    post:
      tags: [Runtime]
      summary: Run a data-plane turn as SSE
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimeTurnRequest" }
      responses:
        "200":
          description: SSE stream of TurnEvent records
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE frames carrying `TurnEvent` payloads plus a terminal `done` frame.
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  # ──────────────── Conversations ────────────────
  /agents/{agent_id}/conversations:
    parameters: [{ $ref: "#/components/parameters/AgentId" }]
    get:
      tags: [Conversations]
      summary: List recent conversations
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 500 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Conversation" }
                  next_cursor: { type: string, nullable: true }

  /conversations/{conversation_id}:
    parameters: [{ $ref: "#/components/parameters/ConversationId" }]
    get:
      tags: [Conversations]
      summary: Get a conversation with full turns + traces
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationDetail" }

  /conversations/{conversation_id}/takeover:
    parameters: [{ $ref: "#/components/parameters/ConversationId" }]
    post:
      tags: [Conversations]
      summary: Operator takes over the conversation (HITL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note: { type: string, maxLength: 2048 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/{conversation_id}/operator-messages:
    parameters: [{ $ref: "#/components/parameters/ConversationId" }]
    post:
      tags: [Conversations]
      summary: Operator sends a message in a taken-over conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorMessageRequest"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationMessage" }
        "409":
          description: Conversation is not in operator takeover.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "404":
          $ref: "#/components/responses/NotFound"

  /conversations/{conversation_id}/handback:
    parameters: [{ $ref: "#/components/parameters/ConversationId" }]
    post:
      tags: [Conversations]
      summary: Operator returns control to the agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note: { type: string, maxLength: 2048 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────── Knowledge ────────────────
  /kb:
    post:
      tags: [Knowledge]
      summary: Create a knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/KBCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KB" }

  /kb/{kb_id}/ingest:
    parameters: [{ $ref: "#/components/parameters/KBId" }]
    post:
      tags: [Knowledge]
      summary: Ingest a source into a KB
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/KBIngestUrl"
                - $ref: "#/components/schemas/KBIngestNotion"
                - $ref: "#/components/schemas/KBIngestS3"
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "202":
          description: Ingestion queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  document_id: { type: string, format: uuid }
                  status: { type: string }

  /kb/{kb_id}/search:
    parameters: [{ $ref: "#/components/parameters/KBId" }]
    get:
      tags: [Knowledge]
      summary: Search the KB
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: top_k
          schema: { type: integer, default: 8, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RetrievalChunk" }

  # ──────────────── MCP ────────────────
  /mcp:
    get:
      tags: [MCP]
      summary: List installed MCP servers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MCPServer" }
    post:
      tags: [MCP]
      summary: Install an MCP server from the Hub or a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source]
              properties:
                source: { type: string, example: "loop-hub://stripe@1.4.0" }
                config: { type: object }
      responses:
        "202":
          description: Install queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPServer" }

  /marketplace:
    get:
      tags: [Marketplace]
      summary: Browse marketplace catalog
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketplaceBrowseList" }

  # ──────────────── Evals ────────────────
  /eval-suites:
    post:
      tags: [Evals]
      summary: Create an eval suite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                cases:
                  type: array
                  items: { $ref: "#/components/schemas/EvalCase" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvalSuite" }

  /eval-suites/{suite_id}/runs:
    parameters: [{ $ref: "#/components/parameters/SuiteId" }]
    post:
      tags: [Evals]
      summary: Start an eval run against an agent version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_version_id]
              properties:
                agent_version_id: { type: string, format: uuid }
                baseline_version_id: { type: string, format: uuid }
      responses:
        "202":
          description: Run queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvalRun" }

  /eval-runs/{run_id}:
    parameters: [{ $ref: "#/components/parameters/RunId" }]
    get:
      tags: [Evals]
      summary: Get eval run status + results
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvalRunDetail" }

  # ──────────────── Usage / Traces ────────────────
  /usage:
    get:
      tags: [Usage]
      summary: Per-workspace usage rollup
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: group_by
          schema: { type: string, enum: [day, agent, channel] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageReport" }

  /traces/{turn_id}:
    parameters: [{ $ref: "#/components/parameters/TurnId" }]
    get:
      tags: [Traces]
      summary: Full trace detail for a turn
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trace" }
        "404":
          $ref: "#/components/responses/NotFound"

  /traces/search:
    get:
      tags: [Traces]
      summary: Search traces by filters
      parameters:
        - in: query
          name: agent_id
          schema: { type: string, format: uuid }
        - in: query
          name: conversation_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, enum: [ok, error, timeout] }
        - in: query
          name: from_date
          schema: { type: string, format: date-time }
        - in: query
          name: to_date
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 500 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Trace" }
                  next_cursor: { type: string, nullable: true }

  /audit/events:
    get:
      operationId: getAuditEvents
      tags: [Admin]
      summary: Get audit log entries
      parameters:
        - in: query
          name: workspace_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: action
          schema: { type: string, example: "agent:deploy" }
        - in: query
          name: resource_type
          schema: { type: string, example: "agent" }
        - in: query
          name: from_date
          schema: { type: string, format: date-time }
        - in: query
          name: to_date
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 1000 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventList"

  /audit-events:
    get:
      operationId: getAuditEventsLegacy
      tags: [Admin]
      summary: Get audit log entries (legacy alias)
      parameters:
        - in: query
          name: workspace_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 1000 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditEventList" }

  /webhooks/incoming:
    post:
      tags: [Admin]
      summary: Register customer webhook for deployment/eval events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url: { type: string, format: uri }
                events: { type: array, items: { type: string }, example: ["deploy.complete", "eval.finished", "budget.alert"] }
                secret: { type: string, description: "HMAC secret for signature verification" }
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookRegistration" }

  /budgets:
    get:
      tags: [Usage]
      summary: List budgets for workspace
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Budget" }
    post:
      tags: [Usage]
      summary: Create a budget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope]
              properties:
                scope: { type: string, enum: [workspace, agent, conversation, day] }
                scope_id: { type: string, format: uuid, nullable: true }
                soft_usd: { type: number }
                hard_usd: { type: number }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Budget" }

  /eval-suites/{suite_id}/cases:
    parameters: [{ $ref: "#/components/parameters/SuiteId" }]
    get:
      tags: [Evals]
      summary: List eval cases in suite
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalCaseList"
    post:
      tags: [Evals]
      summary: Add a test case to suite
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvalCase" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvalCase" }
  /workspaces/{workspace_id}/eval-cases/from-resolution:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
    post:
      tags: [Evals]
      summary: Save an operator resolution as an eval case
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolutionEvalCaseRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResolutionEvalCaseResponse" }

  /healthz:
    get:
      tags: [Health]
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Service is ready

  /readyz:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is alive

  /version:
    get:
      tags: [Health]
      summary: Get API version
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Version" }


components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PASETO

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema: { type: integer, description: "Seconds to wait before retrying" }
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          schema: { type: integer, description: "Unix timestamp of reset" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }

  parameters:
    WorkspaceId:
      in: path
      name: workspace_id
      required: true
      schema: { type: string, format: uuid }
    ActiveWorkspaceId:
      in: header
      name: X-Loop-Workspace-Id
      required: true
      schema: { type: string, format: uuid }
      description: Workspace selected for active agent and audit routes.
    RequestRegion:
      in: header
      name: X-Loop-Region
      required: false
      description: Abstract region serving the request; mismatches with workspace.region return 403.
      schema: { $ref: "#/components/schemas/RegionName" }
    AgentId:
      in: path
      name: agent_id
      required: true
      schema: { type: string, format: uuid }
    ConversationId:
      in: path
      name: conversation_id
      required: true
      schema: { type: string, format: uuid }
    InboxItemId:
      in: path
      name: item_id
      required: true
      schema: { type: string, format: uuid }
    MemoryKey:
      in: path
      name: memory_key
      required: true
      schema: { type: string }
    KBId:
      in: path
      name: kb_id
      required: true
      schema: { type: string, format: uuid }
    SuiteId:
      in: path
      name: suite_id
      required: true
      schema: { type: string, format: uuid }
    RunId:
      in: path
      name: run_id
      required: true
      schema: { type: string, format: uuid }
    TurnId:
      in: path
      name: turn_id
      required: true
      schema: { type: string, format: uuid }

  schemas:

    AuthExchangeRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string
          description: Verified local/IdP access token to exchange.

    AuthExchangeResponse:
      type: object
      required: [access_token, refresh_token, token_type, access_expires_at_ms, refresh_expires_at_ms]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        access_expires_at_ms: { type: integer }
        refresh_expires_at_ms: { type: integer }

    ProblemDetail:
      description: RFC 9457 Problem Details for HTTP APIs
      type: object
      required: [type, status, title]
      properties:
        type: { type: string, format: uri, example: "https://api.loop.example/errors/rate-limit" }
        status: { type: integer, example: 429 }
        title: { type: string, example: "Too Many Requests" }
        detail: { type: string }
        instance: { type: string, format: uri }
        request_id: { type: string, description: "Correlation ID for logs" }

    Workspace:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        plan: { type: string, enum: [hobby, pro, team, enterprise] }
        region: { $ref: "#/components/schemas/RegionName" }
        created_at: { type: string, format: date-time }
        role: { type: string, enum: [owner, admin, member, viewer] }

    WorkspaceList:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Workspace" }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }

    WorkspaceCreate:
      type: object
      required: [name, slug]
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        slug: { type: string, pattern: "^[a-z0-9][a-z0-9-]*$" }
        region:
          allOf: [{ $ref: "#/components/schemas/RegionName" }]
          default: na-east
          description: Immutable workspace region pin selected at creation.

    WorkspacePatch:
      type: object
      description: Mutable workspace metadata. Region changes are rejected.
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }

    RegionName:
      type: string
      enum: [na-east, eu-west]
      description: Abstract Loop region from infra/terraform/regions.yaml.

    Agent:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        active_version: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

    AgentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Agent" }

    AgentCreate:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string, pattern: "^[a-z0-9-]+$" }
        description: { type: string }

    AgentVersion:
      type: object
      required: [id, workspace_id, agent_id, version, spec, notes, created_at, created_by]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        version: { type: integer }
        spec: { type: object }
        notes: { type: string }
        created_at: { type: string, format: date-time }
        created_by: { type: string }

    AgentVersionCreate:
      type: object
      properties:
        spec: { type: object }
        notes: { type: string, maxLength: 2048 }

    AgentVersionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AgentVersion" }

    AgentTool:
      type: object
      required: [id, name, kind, description, source]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string, enum: [mcp, http] }
        description: { type: string }
        source: { type: string }

    AgentToolList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AgentTool" }

    InvokeRequest:
      type: object
      required: [conversation_id, user_id, channel, content]
      properties:
        conversation_id: { type: string, format: uuid }
        user_id: { type: string }
        channel: { type: string, enum: [web, whatsapp, slack, teams, telegram, sms, email, discord, voice, webhook] }
        content:
          type: array
          items: { $ref: "#/components/schemas/ContentPart" }
        metadata: { type: object }

    RuntimeTurnRequest:
      type: object
      required: [workspace_id, conversation_id, user_id]
      description: |
        dp-runtime turn request. Provide either `content` or `input`; `input`
        is normalized into a single text content part before TurnExecutor runs.
      properties:
        workspace_id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        user_id: { type: string }
        channel:
          type: string
          enum: [web, whatsapp, slack, teams, telegram, sms, email, discord, voice, webhook]
          default: web
        content:
          type: array
          items: { $ref: "#/components/schemas/ContentPart" }
        input:
          type: string
          nullable: true
        metadata: { type: object }
        received_at: { type: string, format: date-time, nullable: true }
        request_id: { type: string, nullable: true }
        agent_name: { type: string, default: default }
        model:
          type: string
          nullable: true
          description: Defaults to LOOP_DP_DEFAULT_MODEL.
        system_prompt: { type: string }
        budget: { $ref: "#/components/schemas/TurnBudget" }

    TurnBudget:
      type: object
      properties:
        max_cost_usd: { type: number, default: 0.5 }
        max_runtime_seconds: { type: number, default: 30 }
        max_iterations: { type: integer, default: 4 }
        max_output_tokens_per_iter: { type: integer, default: 2048 }
        fallback_model: { type: string, nullable: true }

    ContentPart:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [text, image, audio, file] }
        text: { type: string }
        url: { type: string }
        mime_type: { type: string }
        bytes_b64: { type: string }

    AgentResponse:
      type: object
      properties:
        conversation_id: { type: string, format: uuid }
        content:
          type: array
          items: { $ref: "#/components/schemas/ContentPart" }
        suggested_actions:
          type: array
          items: { type: object }
        end_turn: { type: boolean }

    TurnEvent:
      type: object
      required: [type, payload, ts]
      properties:
        type:
          type: string
          enum: [token, tool_call, tool_call_start, tool_call_end, tool_result, retrieval, trace, degrade, complete]
        payload: { type: object }
        ts: { type: string, format: date-time }

    RuntimeTurnResponse:
      type: object
      required: [turn_id, reply, events]
      properties:
        turn_id: { type: string }
        reply:
          type: object
          required: [text]
          properties:
            text: { type: string }
        events:
          type: array
          items: { $ref: "#/components/schemas/TurnEvent" }

    Conversation:
      type: object
      required:
        - id
        - workspace_id
        - agent_id
        - subject
        - state
        - operator_taken_over
        - created_at
        - last_message_at
        - message_count
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        subject: { type: string }
        state: { type: string, enum: [open, closed, in-takeover] }
        operator_taken_over: { type: boolean }
        created_at: { type: string, format: date-time }
        last_message_at: { type: string, format: date-time }
        message_count: { type: integer }

    ConversationMessage:
      type: object
      required: [id, conversation_id, role, body, created_at]
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, operator, system] }
        body: { type: string }
        created_at: { type: string, format: date-time }

    ConversationDetail:
      type: object
      required: [summary, last_user_message, last_assistant_message, metadata, messages]
      properties:
        summary: { $ref: "#/components/schemas/Conversation" }
        last_user_message: { type: string }
        last_assistant_message: { type: string }
        metadata: { type: object }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ConversationMessage" }

    OperatorMessageRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 4096 }

    Turn:
      type: object
      properties:
        id: { type: string, format: uuid }
        seq: { type: integer }
        role: { type: string }
        content_json: { type: object }
        token_in: { type: integer }
        token_out: { type: integer }
        cost_usd: { type: number }
        latency_ms: { type: integer }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }

    InboxStatus:
      type: string
      enum: [pending, claimed, resolved]

    InboxChannel:
      type: string
      enum: [web, voice, sms, whatsapp, slack]

    InboxItem:
      type: object
      required:
        - id
        - workspace_id
        - agent_id
        - conversation_id
        - user_id
        - status
        - reason
        - operator_id
        - created_at_ms
        - claimed_at_ms
        - resolved_at_ms
        - last_message_excerpt
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        user_id: { type: string }
        status: { $ref: "#/components/schemas/InboxStatus" }
        reason: { type: string }
        operator_id: { type: string, nullable: true }
        created_at_ms: { type: integer }
        claimed_at_ms: { type: integer, nullable: true }
        resolved_at_ms: { type: integer, nullable: true }
        last_message_excerpt: { type: string }
        team_id:
          type: string
          description: Optional Studio grouping metadata when an inbox backend provides it.
        channel:
          $ref: "#/components/schemas/InboxChannel"

    InboxItemList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/InboxItem" }

    InboxEscalateRequest:
      type: object
      required: [agent_id, conversation_id, user_id, reason]
      properties:
        agent_id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        user_id: { type: string, minLength: 1 }
        reason: { type: string, minLength: 1 }
        last_message_excerpt: { type: string }
        now_ms: { type: integer, minimum: 0 }

    InboxClaimRequest:
      type: object
      properties:
        operator_id: { type: string, nullable: true }
        now_ms: { type: integer, minimum: 0 }

    InboxResolveRequest:
      type: object
      properties:
        now_ms: { type: integer, minimum: 0 }

    MemoryStudioEntry:
      type: object
      required:
        - id
        - workspace_id
        - agent_id
        - scope
        - key
        - before
        - after
        - source
        - source_trace
        - retention_policy
        - updated_at
        - writer_version
        - confidence
        - safety_flags
        - deletion_state
        - deletion_reason
        - replay_impact
      properties:
        id: { type: string }
        workspace_id: { type: string, format: uuid }
