name: runtime-sse-1000

on:
  pull_request:
    paths:
      - ".github/workflows/runtime-sse-1000.yml"
      - "bench/results/runtime_sse_1000_concurrency.json"
      - "infra/helm/loop/**"
      - "packages/control-plane/**"
      - "packages/data-plane/**"
      - "packages/gateway/**"
      - "packages/runtime/**"
      - "packages/sdk-py/**"
      - "scripts/openai_sse_fixture.py"
      - "scripts/k6_runtime_sse_1000.js"
  workflow_dispatch:
  schedule:
    - cron: "7 6 * * *"

jobs:
  runtime-sse-1000:
    name: runtime-sse-1000
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      LOOP_NAMESPACE: loop-runtime-sse
      LOOP_RELEASE: loop
      LOOP_RUNTIME_SSE_BASE_URL: http://127.0.0.1:18082
      LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES: "4294967296"
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: grafana/setup-k6-action@v1
      - uses: helm/kind-action@v1.10.0
        with:
          cluster_name: loop-runtime-sse
          wait: 60s
      - name: Build and load runtime image
        run: |
          docker build -f packages/data-plane/Dockerfile -t loop/dp-runtime:perf .
          kind load docker-image loop/dp-runtime:perf --name loop-runtime-sse
      - name: Build and load OpenAI SSE fixture
        run: |
          cat > /tmp/loop-openai-sse-fixture.Dockerfile <<'DOCKER'
          FROM python:3.12-alpine
          COPY scripts/openai_sse_fixture.py /server.py
          ENV LOOP_OPENAI_FIXTURE_PORT=8089
          CMD ["python", "/server.py"]
          DOCKER
          docker build -f /tmp/loop-openai-sse-fixture.Dockerfile -t loop/openai-sse-fixture:perf .
          kind load docker-image loop/openai-sse-fixture:perf --name loop-runtime-sse
      - name: Start OpenAI SSE fixture
        run: |
          kubectl create namespace "$LOOP_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$LOOP_NAMESPACE" create deployment openai-sse-fixture \
            --image=loop/openai-sse-fixture:perf \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$LOOP_NAMESPACE" expose deployment openai-sse-fixture \
            --port=8089 --target-port=8089 \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$LOOP_NAMESPACE" rollout status deploy/openai-sse-fixture --timeout=60s
      - name: Install Loop chart
        run: |
          helm dependency build infra/helm/loop
          helm upgrade --install "$LOOP_RELEASE" infra/helm/loop \
            --namespace "$LOOP_NAMESPACE" --create-namespace --wait --timeout 8m \
            --set global.imageRegistry=loop --set global.imagePullPolicy=IfNotPresent \
            --set runtime.image.repository=dp-runtime --set runtime.image.tag=perf \
            --set runtime.replicaCount=1 --set controlPlane.enabled=false \
            --set gateway.enabled=false --set kbEngine.enabled=false --set toolHost.enabled=false \
            --set-string runtime.env[0].name=LOOP_DP_OPENAI_BASE_URL \
            --set-string runtime.env[0].value=http://openai-sse-fixture:8089 \
            --set-string runtime.env[1].name=LOOP_GATEWAY_OPENAI_API_KEY \
            --set-string runtime.env[1].value=perf-fixture-key \
            --set-string runtime.env[2].name=LOOP_DP_DEFAULT_MODEL \
            --set-string runtime.env[2].value=gpt-4o-mini \
            --set postgresql.enabled=false --set redis.enabled=false --set qdrant.enabled=false \
            --set nats.enabled=false --set minio.enabled=false \
            --set clickhouse.enabled=false
      - name: Run 1000 SSE turns
        run: |
          kubectl -n "$LOOP_NAMESPACE" rollout status deploy/loop-loop-runtime --timeout=90s
          kubectl -n "$LOOP_NAMESPACE" port-forward svc/loop-loop-runtime 18082:8081 >/tmp/runtime-sse.log 2>&1 &
          pf_pid=$!
          trap 'kill "$pf_pid"' EXIT
          for _ in $(seq 1 30); do
            curl -fsS "$LOOP_RUNTIME_SSE_BASE_URL/healthz" >/dev/null && break
            sleep 1
          done
          k6 run --summary-export /tmp/runtime-sse-1000-summary.json scripts/k6_runtime_sse_1000.js
      - name: Check runtime memory
        run: |
          pod=$(kubectl -n "$LOOP_NAMESPACE" get pod -l app.kubernetes.io/component=runtime -o jsonpath='{.items[0].metadata.name}')
          memory=$(kubectl -n "$LOOP_NAMESPACE" exec "$pod" -- sh -c 'cat /sys/fs/cgroup/memory.current 2>/dev/null || cat /sys/fs/cgroup/memory/memory.usage_in_bytes')
          echo "{\"memory_bytes\":$memory,\"budget_bytes\":$LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES}" >/tmp/runtime-sse-memory.json
          test "$memory" -lt "$LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES"
      - name: Upload runtime SSE reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sse-1000
          path: |
            /tmp/runtime-sse-1000-summary.json
            /tmp/runtime-sse-memory.json
          if-no-files-found: ignore
      - name: Page on-call
        if: failure()
        env:
          LOOP_ONCALL_WEBHOOK_URL: ${{ secrets.LOOP_ONCALL_WEBHOOK_URL }}
        run: |
          if [ -z "$LOOP_ONCALL_WEBHOOK_URL" ]; then exit 1; fi
          curl -fsS -X POST -H "content-type: application/json" \
            --data "{\"summary\":\"Loop runtime SSE 1000 concurrency gate failed\",\"severity\":\"critical\",\"source\":\"github-actions\"}" \
            "$LOOP_ONCALL_WEBHOOK_URL"
