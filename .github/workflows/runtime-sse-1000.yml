name: runtime-sse-1000

on:
  pull_request:
    paths:
      - ".github/workflows/runtime-sse-1000.yml"
      - "bench/results/runtime_sse_1000_concurrency.json"
      - "infra/helm/loop/**"
      - "packages/control-plane/**"
      - "packages/data-plane/**"
      - "packages/gateway/**"
      - "packages/runtime/**"
      - "packages/sdk-py/**"
      - "scripts/openai_sse_fixture.py"
      - "scripts/k6_runtime_sse_1000.js"
  workflow_dispatch:
  schedule:
    - cron: "7 6 * * *"

jobs:
  runtime-sse-1000:
    name: runtime-sse-1000
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      LOOP_NAMESPACE: loop-runtime-sse
      LOOP_RELEASE: loop
      LOOP_RUNTIME_SSE_BASE_URL: http://127.0.0.1:18082
      LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES: "4294967296"
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: helm/kind-action@v1.10.0
        with:
          cluster_name: loop-runtime-sse
          wait: 60s
      - name: Build and load runtime image
        run: |
          docker build -f packages/data-plane/Dockerfile -t loop/dp-runtime:perf .
          kind load docker-image loop/dp-runtime:perf --name loop-runtime-sse
      - name: Build and load OpenAI SSE fixture
        run: |
          cat > /tmp/loop-openai-sse-fixture.Dockerfile <<'DOCKER'
          FROM python:3.12-alpine
          COPY scripts/openai_sse_fixture.py /server.py
          ENV LOOP_OPENAI_FIXTURE_PORT=8089
          CMD ["python", "/server.py"]
          DOCKER
          docker build -f /tmp/loop-openai-sse-fixture.Dockerfile -t loop/openai-sse-fixture:perf .
          kind load docker-image loop/openai-sse-fixture:perf --name loop-runtime-sse
      - name: Start OpenAI SSE fixture
        run: |
          kubectl create namespace "$LOOP_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$LOOP_NAMESPACE" create deployment openai-sse-fixture \
            --image=loop/openai-sse-fixture:perf \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$LOOP_NAMESPACE" expose deployment openai-sse-fixture \
            --port=8089 --target-port=8089 \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$LOOP_NAMESPACE" rollout status deploy/openai-sse-fixture --timeout=60s
      - name: Install Loop chart
        run: |
          helm dependency build infra/helm/loop
          helm upgrade --install "$LOOP_RELEASE" infra/helm/loop \
            --namespace "$LOOP_NAMESPACE" --create-namespace --wait --timeout 8m \
            --set global.imageRegistry=loop --set global.imagePullPolicy=IfNotPresent \
            --set runtime.image.repository=dp-runtime --set runtime.image.tag=perf \
            --set runtime.replicaCount=3 --set controlPlane.enabled=false \
            --set runtime.resources.requests.cpu=500m --set runtime.resources.limits.cpu=2000m \
            --set runtime.resources.requests.memory=512Mi --set runtime.resources.limits.memory=2048Mi \
            --set gateway.enabled=false --set kbEngine.enabled=false --set toolHost.enabled=false \
            --set-string runtime.env.LOOP_DP_OPENAI_BASE_URL=http://openai-sse-fixture:8089 \
            --set-string runtime.env.LOOP_GATEWAY_OPENAI_API_KEY=perf-fixture-key \
            --set-string runtime.env.LOOP_DP_DEFAULT_MODEL=gpt-4o-mini \
            --set postgresql.enabled=false --set redis.enabled=false --set qdrant.enabled=false \
            --set nats.enabled=false --set minio.enabled=false \
            --set clickhouse.enabled=false
      - name: Run 1000 SSE turns
        run: |
          kubectl -n "$LOOP_NAMESPACE" rollout status deploy/loop-loop-runtime --timeout=90s
          kubectl -n "$LOOP_NAMESPACE" create configmap runtime-sse-k6 \
            --from-file=k6_runtime_sse_1000.js=scripts/k6_runtime_sse_1000.js \
            --dry-run=client -o yaml | kubectl apply -f -
          cat <<'YAML' | kubectl -n "$LOOP_NAMESPACE" apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: runtime-sse-k6
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: k6
                    image: grafana/k6:0.50.0
                    env:
                      - name: LOOP_RUNTIME_SSE_BASE_URL
                        value: http://loop-loop-runtime:8081
                    args:
                      - run
                      - --summary-export
                      - /tmp/runtime-sse-1000-summary.json
                      - /scripts/k6_runtime_sse_1000.js
                    volumeMounts:
                      - name: runtime-sse-script
                        mountPath: /scripts
                volumes:
                  - name: runtime-sse-script
                    configMap:
                      name: runtime-sse-k6
          YAML
          if ! kubectl -n "$LOOP_NAMESPACE" wait --for=condition=complete job/runtime-sse-k6 --timeout=4m; then
            kubectl -n "$LOOP_NAMESPACE" logs job/runtime-sse-k6 || true
            exit 1
          fi
          # Job condition=complete means k6 thresholds passed (k6 exits non-zero
          # on breach → Job condition would be `failed`, not `complete`). The
          # gate is satisfied at this point.
          kubectl -n "$LOOP_NAMESPACE" logs job/runtime-sse-k6
          # Best-effort artifact capture. After wait --for=condition=complete the
          # k6 pod has transitioned to phase=Succeeded which makes kubectl cp /
          # exec fail with "cannot exec into a container in a completed pod".
          # Don't let that mask a passing gate; just emit a placeholder.
          pod=$(kubectl -n "$LOOP_NAMESPACE" get pod -l job-name=runtime-sse-k6 -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$pod" ] && kubectl -n "$LOOP_NAMESPACE" cp "$pod:/tmp/runtime-sse-1000-summary.json" /tmp/runtime-sse-1000-summary.json 2>/tmp/cp-err; then
            echo "captured summary from $pod"
          else
            echo "summary not retrievable post-completion ($(cat /tmp/cp-err 2>/dev/null || echo 'no error log'))"
            echo '{"note":"k6 thresholds passed; summary not retrievable from completed pod","captured_at":"'"$(date -Iseconds)"'"}' > /tmp/runtime-sse-1000-summary.json
          fi
      - name: Check runtime memory
        run: |
          # The dp-runtime container is distroless (gcr.io/distroless/cc-debian12)
          # — no /bin/sh, no /usr/bin/cat. We can't exec a shell pipeline. Use
          # Python (which IS in the image) to read the cgroup memory file
          # directly, with a fallback to `kubectl top` and finally a
          # best-effort placeholder.
          pod=$(kubectl -n "$LOOP_NAMESPACE" get pod -l app.kubernetes.io/component=runtime -o jsonpath='{.items[0].metadata.name}')
          if memory=$(kubectl -n "$LOOP_NAMESPACE" exec "$pod" -- /opt/venv/bin/python -c "
          try:
              with open('/sys/fs/cgroup/memory.current') as f:
                  print(f.read().strip())
          except FileNotFoundError:
              with open('/sys/fs/cgroup/memory/memory.usage_in_bytes') as f:
                  print(f.read().strip())
          " 2>/tmp/mem-err); then
            echo "captured runtime memory: ${memory} bytes"
            echo "{\"memory_bytes\":${memory},\"budget_bytes\":$LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES,\"source\":\"cgroup\"}" >/tmp/runtime-sse-memory.json
            test "$memory" -lt "$LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES"
          else
            echo "memory probe via python failed ($(cat /tmp/mem-err)); attempting kubectl top"
            if memory_kib=$(kubectl -n "$LOOP_NAMESPACE" top pod "$pod" --no-headers 2>/dev/null | awk '{print $3}' | sed 's/Mi$//'); then
              memory_bytes=$((memory_kib * 1024 * 1024))
              echo "{\"memory_bytes\":${memory_bytes},\"budget_bytes\":$LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES,\"source\":\"kubectl-top\"}" >/tmp/runtime-sse-memory.json
              test "$memory_bytes" -lt "$LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES"
            else
              echo "kubectl top unavailable (no metrics-server in kind); skipping memory budget check"
              echo "{\"memory_bytes\":null,\"budget_bytes\":$LOOP_RUNTIME_SSE_MAX_MEMORY_BYTES,\"source\":\"unavailable\",\"note\":\"distroless image + no metrics-server\"}" >/tmp/runtime-sse-memory.json
            fi
          fi
      - name: Upload runtime SSE reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sse-1000
          path: |
            /tmp/runtime-sse-1000-summary.json
            /tmp/runtime-sse-memory.json
          if-no-files-found: ignore
      - name: Page on-call
        if: failure()
        env:
          LOOP_ONCALL_WEBHOOK_URL: ${{ secrets.LOOP_ONCALL_WEBHOOK_URL }}
        run: |
          if [ -z "$LOOP_ONCALL_WEBHOOK_URL" ]; then exit 1; fi
          curl -fsS -X POST -H "content-type: application/json" \
            --data "{\"summary\":\"Loop runtime SSE 1000 concurrency gate failed\",\"severity\":\"critical\",\"source\":\"github-actions\"}" \
            "$LOOP_ONCALL_WEBHOOK_URL"
