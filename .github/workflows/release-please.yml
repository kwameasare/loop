name: release-please

# Cut a release PR on every push to main using release-please. The PR
# updates CHANGELOG.md and .release-please-manifest.json from Conventional
# Commit history. Merging the release PR creates the GitHub release and
# the version tag.
#
# Wired for S670 (1.0 release notes + changelog automation).

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
