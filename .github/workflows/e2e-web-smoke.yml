name: E2E Web Smoke

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

jobs:
  e2e-web-smoke:
    name: e2e-web-smoke
    runs-on: ubuntu-latest
    env:
      LOOP_DEMO_URL: ${{ vars.LOOP_DEMO_URL }}
      LOOP_DEMO_CHAT_ENDPOINT: ${{ vars.LOOP_DEMO_CHAT_ENDPOINT }}
      LOOP_DEMO_QUESTION: ${{ vars.LOOP_DEMO_QUESTION }}
      LOOP_DEMO_EXPECTED_ANSWER: ${{ vars.LOOP_DEMO_EXPECTED_ANSWER }}
      LOOP_DEMO_TIMEOUT_SECONDS: ${{ vars.LOOP_DEMO_TIMEOUT_SECONDS }}
      LOOP_DEMO_TOKEN: ${{ secrets.LOOP_DEMO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - name: Require demo smoke configuration
        run: |
          test -n "$LOOP_DEMO_URL"
          test -n "$LOOP_DEMO_EXPECTED_ANSWER"
      - run: bash scripts/e2e_web_smoke.sh
