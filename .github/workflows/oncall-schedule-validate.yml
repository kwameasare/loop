name: oncall-schedule-validate

on:
  pull_request:
    paths:
      - ".github/workflows/oncall-schedule-validate.yml"
      - "infra/oncall/schedule.yaml"
      - "infra/terraform/modules/pagerduty-oncall/**"
      - "tools/validate_oncall_schedule.py"
  workflow_dispatch:

jobs:
  oncall-schedule-validate:
    name: oncall-schedule-validate
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - name: Validate on-call schedule schema
        run: python tools/validate_oncall_schedule.py --schedule infra/oncall/schedule.yaml
