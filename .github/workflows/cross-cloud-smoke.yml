name: cross-cloud-smoke

on:
  pull_request:
    paths:
      - ".github/workflows/cross-cloud-smoke.yml"
      - "infra/helm/loop/**"
      - "docs/CLOUD_PROOF.md"
      - "scripts/Dockerfile.smoke"
      - "scripts/cross_cloud_smoke.*"
      - "scripts/cloud_proof_report.py"
      - "scripts/helm_e2e_smoke_server.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/cross-cloud-smoke.yml"
      - "infra/helm/loop/**"
      - "docs/CLOUD_PROOF.md"
      - "scripts/Dockerfile.smoke"
      - "scripts/cross_cloud_smoke.*"
      - "scripts/cloud_proof_report.py"
      - "scripts/helm_e2e_smoke_server.py"
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  cross-cloud-smoke:
    name: cross-cloud-smoke (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
            region: na-east
            cluster: loop-aws-smoke
            namespace: loop-aws-smoke
            port: 18101
          - cloud: azure
            region: eu-west
            cluster: loop-azure-smoke
            namespace: loop-azure-smoke
            port: 18102
          - cloud: gcp
            region: apac-sg
            cluster: loop-gcp-smoke
            namespace: loop-gcp-smoke
            port: 18103
    env:
      LOOP_RELEASE: loop
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: ${{ matrix.cluster }}
          wait: 60s
      - name: Build and load smoke image
        run: |
          docker build -f scripts/Dockerfile.smoke \
            --build-arg SMOKE_SCRIPT=scripts/helm_e2e_smoke_server.py \
            --build-arg SMOKE_PORTS=8080,8081,8082,8003 \
            -t loop/helm-smoke:ci .
          kind load docker-image loop/helm-smoke:ci --name "${{ matrix.cluster }}"
      - name: Install Loop chart for ${{ matrix.cloud }}
        run: |
          helm dependency build infra/helm/loop
          helm upgrade --install "$LOOP_RELEASE" infra/helm/loop \
            --namespace "${{ matrix.namespace }}" --create-namespace \
            --wait --timeout 8m \
            --set global.cloud="${{ matrix.cloud }}" \
            --set global.region="${{ matrix.region }}" \
            --set global.imageRegistry=loop \
            --set global.imagePullPolicy=IfNotPresent \
            --set controlPlane.image.repository=helm-smoke \
            --set controlPlane.image.tag=ci \
            --set controlPlane.replicaCount=1 \
            --set controlPlane.env.LOOP_CLOUD="${{ matrix.cloud }}" \
            --set controlPlane.env.LOOP_REGION="${{ matrix.region }}" \
            --set runtime.image.repository=helm-smoke \
            --set runtime.image.tag=ci \
            --set runtime.replicaCount=1 \
            --set runtime.env.LOOP_CLOUD="${{ matrix.cloud }}" \
            --set runtime.env.LOOP_REGION="${{ matrix.region }}" \
            --set gateway.image.repository=helm-smoke \
            --set gateway.image.tag=ci \
            --set gateway.replicaCount=1 \
            --set kbEngine.image.repository=helm-smoke \
            --set kbEngine.image.tag=ci \
            --set kbEngine.replicaCount=1 \
            --set toolHost.enabled=false \
            --set postgresql.enabled=false \
            --set redis.enabled=false \
            --set qdrant.enabled=false \
            --set nats.enabled=false \
            --set minio.enabled=false \
            --set clickhouse.enabled=false
      - name: Run first-turn smoke for ${{ matrix.cloud }}
        id: smoke
        continue-on-error: true
        run: |
          kubectl -n "${{ matrix.namespace }}" rollout status deploy/loop-loop-runtime --timeout=90s
          kubectl -n "${{ matrix.namespace }}" port-forward svc/loop-loop-runtime \
            "${{ matrix.port }}":8081 >/tmp/loop-${{ matrix.cloud }}-runtime.log 2>&1 &
          pf_pid=$!
          trap 'kill "$pf_pid"' EXIT
          scripts/cross_cloud_smoke.sh \
            --cloud "${{ matrix.cloud }}" \
            --region "${{ matrix.region }}" \
            --base-url "http://127.0.0.1:${{ matrix.port }}"
      - name: Write cloud proof mark
        if: always()
        env:
          SMOKE_STATUS: ${{ steps.smoke.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/cloud_proof_report.py mark \
            --cloud "${{ matrix.cloud }}" \
            --region "${{ matrix.region }}" \
            --status "$SMOKE_STATUS" \
            --run-url "$RUN_URL" \
            --sha "${{ github.sha }}" \
            --output "cloud-proof-${{ matrix.cloud }}.json"
      - name: Upload cloud proof mark
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-proof-${{ matrix.cloud }}
          path: cloud-proof-${{ matrix.cloud }}.json
      - name: Fail failed smoke
        if: steps.smoke.outcome != 'success'
        run: exit 1
      - name: Dump cluster diagnostics
        if: failure()
        run: |
          kubectl -n "${{ matrix.namespace }}" get all
          kubectl -n "${{ matrix.namespace }}" describe pods
          kubectl -n "${{ matrix.namespace }}" logs -l app.kubernetes.io/instance=loop \
            --all-containers --tail=120
      - name: Page on-call
        if: failure()
        env:
          LOOP_ONCALL_WEBHOOK_URL: ${{ secrets.LOOP_ONCALL_WEBHOOK_URL }}
          SMOKE_CLOUD: ${{ matrix.cloud }}
          SMOKE_REGION: ${{ matrix.region }}
        run: |
          if [ -z "$LOOP_ONCALL_WEBHOOK_URL" ]; then
            echo "::error::LOOP_ONCALL_WEBHOOK_URL secret is required to page on-call"
            exit 1
          fi
          python3 - <<'PY' >/tmp/oncall-payload.json
          import json, os
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          print(json.dumps({
              "summary": f"Loop cross-cloud smoke failed for {os.environ['SMOKE_CLOUD']}/{os.environ['SMOKE_REGION']}",
              "severity": "critical",
              "source": "github-actions",
              "run_url": run_url,
          }))
          PY
          curl -fsS -X POST -H "content-type: application/json" \
            --data @/tmp/oncall-payload.json "$LOOP_ONCALL_WEBHOOK_URL"
  publish-cloud-proof:
    name: publish cloud proof
    needs: cross-cloud-smoke
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: cloud-proof-*
          merge-multiple: true
          path: .cloud-proof
      - name: Append nightly cloud proof marks
        run: |
          shopt -s nullglob
          marks=(.cloud-proof/cloud-proof-*.json)
          python scripts/cloud_proof_report.py append \
            --report docs/CLOUD_PROOF.md \
            "${marks[@]}"
      - name: Commit published cloud proof
        run: |
          if git diff --quiet docs/CLOUD_PROOF.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CLOUD_PROOF.md
          git commit -m "docs(cloud): update portability proof marks"
          git push
