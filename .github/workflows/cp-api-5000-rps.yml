name: cp-api-5000-rps

on:
  pull_request:
    paths:
      - ".github/workflows/cp-api-5000-rps.yml"
      - "bench/results/cp_api_5000_rps.json"
      - "infra/helm/loop/**"
      - "packages/control-plane/**"
      - "scripts/k6_cp_api_5000.js"
  workflow_dispatch:
  schedule:
    - cron: "13 6 * * *"

jobs:
  cp-api-5000-rps:
    name: cp-api-5000-rps
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      LOOP_NAMESPACE: loop-cp-api-rps
      LOOP_RELEASE: loop
      LOOP_CP_API_BASE_URL: http://127.0.0.1:18080
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: grafana/setup-k6-action@v1
      - uses: helm/kind-action@v1.10.0
        with:
          cluster_name: loop-cp-api-rps
          wait: 60s
      - name: Build and load cp-api image
        run: |
          docker build -f packages/control-plane/Dockerfile -t loop/cp-api:perf .
          kind load docker-image loop/cp-api:perf --name loop-cp-api-rps
      - name: Install control plane
        run: |
          helm dependency build infra/helm/loop
          helm upgrade --install "$LOOP_RELEASE" infra/helm/loop \
            --namespace "$LOOP_NAMESPACE" --create-namespace --wait --timeout 8m \
            --set global.imageRegistry=loop --set global.imagePullPolicy=IfNotPresent \
            --set controlPlane.image.repository=cp-api --set controlPlane.image.tag=perf \
            --set controlPlane.replicaCount=3 --set runtime.enabled=false \
            --set controlPlane.resources.requests.cpu=500m --set controlPlane.resources.limits.cpu=2000m \
            --set controlPlane.resources.requests.memory=512Mi --set controlPlane.resources.limits.memory=2048Mi \
            --set gateway.enabled=false --set kbEngine.enabled=false --set toolHost.enabled=false \
            --set postgresql.enabled=false --set redis.enabled=false --set qdrant.enabled=false \
            --set nats.enabled=false --set minio.enabled=false --set clickhouse.enabled=false \
            --set migrations.enabled=false
      - name: Run 5000 RPS gate
        run: |
          kubectl -n "$LOOP_NAMESPACE" rollout status deploy/loop-loop-control-plane --timeout=90s
          kubectl -n "$LOOP_NAMESPACE" port-forward svc/loop-loop-control-plane 18080:8080 >/tmp/cp-api-rps.log 2>&1 &
          pf_pid=$!
          trap 'kill "$pf_pid"' EXIT
          for _ in $(seq 1 30); do
            curl -fsS "$LOOP_CP_API_BASE_URL/healthz" >/dev/null && break
            sleep 1
          done
          k6 run --summary-export /tmp/cp-api-5000-rps-summary.json scripts/k6_cp_api_5000.js
      - name: Upload cp-api RPS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cp-api-5000-rps
          path: /tmp/cp-api-5000-rps-summary.json
          if-no-files-found: ignore
      - name: Page on-call
        if: failure()
        env:
          LOOP_ONCALL_WEBHOOK_URL: ${{ secrets.LOOP_ONCALL_WEBHOOK_URL }}
        run: |
          if [ -z "$LOOP_ONCALL_WEBHOOK_URL" ]; then exit 1; fi
          curl -fsS -X POST -H "content-type: application/json" \
            --data "{\"summary\":\"Loop cp-api 5000 RPS gate failed\",\"severity\":\"critical\",\"source\":\"github-actions\"}" \
            "$LOOP_ONCALL_WEBHOOK_URL"
