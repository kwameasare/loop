name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Sprint 0 CI policy:
# - Required-on-main jobs (must pass to merge): lint, unit, tracker-clean, security.
# - Conditionally-required jobs (gated by hashFiles on the relevant artefact):
#   integration (when infra tests exist), studio (when apps/studio exists),
#   cli (when cli/ exists), evals (when tests/evals/ exists).
# Update docs/branch-protection.md whenever the required-checks list changes.

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      # Hermetic: no integration/e2e markers selected.
      - run: uv run pytest -q -m "not integration and not e2e"

  cp-api-image:
    name: cp-api-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CP_API_IMAGE: ghcr.io/loop-ai/cp-api:${{ github.sha }}
      CP_API_IMAGE_MAIN: ghcr.io/loop-ai/cp-api:main
      CP_API_MAX_BYTES: "120000000"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build cp-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/control-plane/Dockerfile
          load: true
          tags: ${{ env.CP_API_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Enforce image size budget
        run: |
          size="$(docker image inspect "$CP_API_IMAGE" --format '{{.Size}}')"
          echo "cp-api image size: ${size} bytes"
          test "$size" -lt "$CP_API_MAX_BYTES"
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.CP_API_IMAGE }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "1"
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push cp-api image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$CP_API_IMAGE" "$CP_API_IMAGE_MAIN"
          docker push "$CP_API_IMAGE"
          docker push "$CP_API_IMAGE_MAIN"

  tracker-clean:
    name: tracker-clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # build_tracker.py is stdlib-only, no uv sync needed.
      - name: Tracker outputs are up to date
        run: python tools/build_tracker.py --check
      - name: Tracker Notes-cell structure
        run: python tools/check_tracker_notes.py

  docs-with-code:
    name: docs-with-code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for `git diff base...head`
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Code touching schemas/types/errors/env-vars must update docs
        # PR: diff base..head. Push-to-main: diff previous-commit..HEAD so
        # direct pushes (which bypass PR review) still get audited.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          python tools/check_docs_with_code.py --base "$BASE" --head HEAD

  checkpoint-discipline:
    name: checkpoint-discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Long feature commits must be preceded by a checkpoint
        # Same dual-mode logic as docs-with-code: enforce on push-to-main
        # too so a direct-push agent can't bypass the rule.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          python tools/check_checkpoint_discipline.py --base "$BASE" --head HEAD

  no-bulk-close:
    name: no-bulk-close
    runs-on: ubuntu-latest
    # Multi-agent rule (SKILL_ROUTER §16): fail if any commit closes more
    # than one story. Runs on every push and every PR.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reject bulk-close commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          python tools/check_no_bulk_close.py --base "$BASE" --head HEAD

  direct-push-alarm:
    name: direct-push-alarm
    runs-on: ubuntu-latest
    # SKILL_ROUTER §17: All work goes through PR. This workflow loudly
    # fails on any push-to-main that isn't a squash-merge of a PR. It
    # cannot prevent the push (only branch protection can), but it makes
    # bypass attempts visible. Once branch protection is applied the
    # condition below should never fire in practice.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Confirm HEAD is a squash-merge of a PR
        run: |
          # Squash-merge commits land on main with a single parent and a
          # subject containing "(#NNN)" (the PR number). Anything else is
          # a direct push.
          subj=$(git log -1 --format='%s' HEAD)
          parents=$(git log -1 --format='%P' HEAD | wc -w)
          if [ "$parents" -gt 1 ]; then
            echo "::error::HEAD is a non-squash merge ($parents parents). Configure 'Squash and merge' as the only allowed strategy in repo settings."
            exit 1
          fi
          if ! echo "$subj" | grep -qE '\(#[0-9]+\)$'; then
            echo "::error::HEAD looks like a DIRECT PUSH to main (subject does not end in PR number). All work must go through PR. Apply branch protection per docs/branch-protection.md immediately."
            echo "Offending subject: $subj"
            exit 1
          fi
          echo "direct-push-alarm: HEAD is a clean squash-merge (subject ends in PR number)."

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - name: Python dep audit (pip-audit)
        # Sprint 0: surface findings without blocking the merge while the
        # dependency surface is still small. Flip to blocking once S046
        # (SOC2 kickoff) starts.
        run: uv tool run --from pip-audit pip-audit || echo "pip-audit reported findings (non-blocking during Sprint 0)."
      - name: Filesystem vuln scan (trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  integration:
    name: integration
    runs-on: ubuntu-latest
    # Skip until S003 lands the full docker-compose stack and there are
    # tests carrying the `integration` marker.
    if: hashFiles('tests/integration/**', 'packages/**/*integration*.py') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: docker compose -f infra/docker-compose.yml up -d
      - run: uv sync --all-packages
      - run: uv run pytest -q -m integration
      - if: always()
        run: docker compose -f infra/docker-compose.yml logs

  studio:
    name: studio
    runs-on: ubuntu-latest
    if: hashFiles('apps/studio/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm -C apps/studio install --frozen-lockfile
      - run: pnpm -C apps/studio lint
      - run: pnpm -C apps/studio test
      - run: pnpm -C apps/studio build

  cli:
    name: cli
    runs-on: ubuntu-latest
    if: hashFiles('cli/go.mod') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: cd cli && go test ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli

  evals:
    name: evals
    runs-on: ubuntu-latest
    # Activates once S021 lands the eval harness + suites.
    if: hashFiles('tests/evals/runtime/**') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: docker compose -f infra/docker-compose.yml up -d
      - run: uv run loop eval run tests/evals/runtime --fail-on "regression>5%"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_TEST_KEY }}
