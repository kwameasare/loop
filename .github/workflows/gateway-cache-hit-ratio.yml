name: gateway-cache-hit-ratio

on:
  pull_request:
    paths:
      - ".github/workflows/gateway-cache-hit-ratio.yml"
      - "bench/results/gateway_cache_hit_ratio.json"
      - "packages/gateway/**"
      - "scripts/gateway_cache_hit_ratio.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/gateway-cache-hit-ratio.yml"
      - "bench/results/gateway_cache_hit_ratio.json"
      - "packages/gateway/**"
      - "scripts/gateway_cache_hit_ratio.py"
  workflow_dispatch:
  schedule:
    - cron: "52 5 * * *"

jobs:
  gateway-cache-hit-ratio:
    name: gateway-cache-hit-ratio
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run fixed cache eval
        id: cache_eval
        continue-on-error: true
        run: |
          uv run python scripts/gateway_cache_hit_ratio.py \
            --output bench/results/gateway_cache_hit_ratio.json \
            --min-hit-ratio 0.30
      - name: Upload cache hit-ratio report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-cache-hit-ratio
          path: bench/results/gateway_cache_hit_ratio.json
          if-no-files-found: error
      - name: Fail below target
        if: steps.cache_eval.outcome != 'success'
        run: exit 1
      - name: Page on-call
        if: failure()
        env:
          LOOP_ONCALL_WEBHOOK_URL: ${{ secrets.LOOP_ONCALL_WEBHOOK_URL }}
        run: |
          if [ -z "$LOOP_ONCALL_WEBHOOK_URL" ]; then
            echo "::error::LOOP_ONCALL_WEBHOOK_URL secret is required to page on-call"
            exit 1
          fi
          python3 - <<'PY' >/tmp/oncall-payload.json
          import json, os
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          print(json.dumps({
              "summary": "Loop gateway cache hit ratio fell below 30%",
              "severity": "critical",
              "source": "github-actions",
              "run_url": run_url,
          }))
          PY
          curl -fsS -X POST -H "content-type: application/json" \
            --data @/tmp/oncall-payload.json "$LOOP_ONCALL_WEBHOOK_URL"
