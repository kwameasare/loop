name: kms-integration

on:
  pull_request:
    paths:
      - ".github/workflows/kms-integration.yml"
      - "packages/control-plane/loop_control_plane/kms.py"
      - "packages/control-plane/loop_control_plane/vault_transit.py"
      - "packages/control-plane/loop_control_plane/aws_backends.py"
      - "tests/test_vault_transit_integration.py"
      - "tests/test_aws_backends_integration.py"
  workflow_dispatch:

jobs:
  kms-integration:
    name: kms-integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      vault:
        image: hashicorp/vault:1.18
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      localstack:
        image: localstack/localstack:3.7
        ports:
          - 4566:4566
        env:
          SERVICES: s3,kms
          AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - name: Install optional backend dependencies
        run: uv pip install -e 'packages/control-plane[vault,aws]'
      - name: Wait for Vault and enable transit engine
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8200/v1/sys/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS -X POST \
            -H "X-Vault-Token: root" \
            -H "content-type: application/json" \
            --data '{"type":"transit"}' \
            http://127.0.0.1:8200/v1/sys/mounts/transit
      - name: Run Vault transit + AWS KMS integration tests
        env:
          LOOP_VAULT_INTEGRATION: "1"
          LOOP_VAULT_ADDR: http://127.0.0.1:8200
          LOOP_VAULT_TOKEN: root
          LOOP_AWS_INTEGRATION: "1"
          LOOP_AWS_ENDPOINT_URL: http://127.0.0.1:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          uv run pytest -q \
            tests/test_vault_transit_integration.py \
            tests/test_aws_backends_integration.py
