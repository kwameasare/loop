version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    labels: [dependencies, python]
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  - package-ecosystem: pip
    directory: /packages/control-plane
    schedule: { interval: weekly, day: monday, time: "04:00" }
    labels: [dependencies, python]
    groups: { pip-minor-patch: { patterns: ["*"], update-types: [minor, patch] } }
    ignore: [{ dependency-name: "*", update-types: [version-update:semver-major] }]

